<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سباق المعرفة</title>
<style>
:root{--ink:#17201b;--muted:#607067;--bg:#fbfaf5;--card:#fff;--line:#d8ded8;--teal:#177e89;--mint:#49a078;--red:#e96d5b;--gold:#f4b942}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(#fff8,#fbfaf5),repeating-linear-gradient(90deg,#e5eee7 0 1px,transparent 1px 78px);color:var(--ink)}main{width:min(1120px,calc(100% - 24px));margin:auto;padding:22px 0 30px}header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}h1{font-size:clamp(34px,6vw,62px);margin:0;letter-spacing:0}.badge{border:1px solid var(--line);background:#ffffffe0;border-radius:999px;padding:8px 12px;color:var(--muted);white-space:nowrap}.grid{display:grid;grid-template-columns:minmax(300px,390px) 1fr;gap:16px;align-items:start}.panel{background:#fffffff0;border:1px solid var(--line);border-radius:8px;box-shadow:0 16px 36px #17201b1c}.control{padding:16px;position:sticky;top:12px}label{display:block;color:var(--muted);font-size:14px;margin-bottom:7px}select,button{font:inherit}select{width:100%;min-height:46px;border:1px solid #cbd4cc;border-radius:8px;padding:0 12px;background:white}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.stat{border:1px solid var(--line);border-radius:8px;background:#f7faf7;padding:10px}.stat b{display:block;font-size:24px}.stat span{font-size:12px;color:var(--muted)}.question{min-height:122px;background:#17201b;color:white;border-radius:8px;padding:15px;display:grid;align-content:center;gap:8px}.question small{color:#ffffffaa}.question strong{font-size:21px;line-height:1.45}.answers{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.answer{min-height:48px;border-radius:8px;border:1px solid #cfdad1;background:#edf4ef;font-weight:800;cursor:pointer}.answer.ok{background:#dff4e7;border-color:#80c99d}.answer.no{background:#ffe5df;border-color:#f0a195}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.primary{background:var(--teal);color:white}.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.actions button{min-height:44px;border-radius:8px;border:0;font-weight:800;cursor:pointer}.toast{min-height:28px;margin-top:10px;color:var(--muted);font-weight:800}.race h2{margin:0;padding:16px;border-bottom:1px solid var(--line)}.tracks{padding:12px;display:grid;gap:8px;max-height:690px;overflow:auto}.lane{display:grid;grid-template-columns:minmax(135px,230px) 1fr 58px;gap:10px;align-items:center;min-height:56px;border:1px solid #d9e0d8;border-radius:8px;padding:8px;background:linear-gradient(90deg,#ffffffc9,#ffffff55),repeating-linear-gradient(0deg,transparent 0 23px,#17201b14 23px 24px)}.lane.me{border-color:var(--teal);box-shadow:inset 0 0 0 2px #177e8926}.name{font-weight:900;line-height:1.28;overflow-wrap:anywhere}.name small{display:block;color:var(--muted);font-size:12px;font-weight:600}.road{position:relative;height:31px;border-radius:999px;background:#e5ece6;border:1px solid #cad5cd;overflow:hidden}.road:after{content:"";position:absolute;inset:14px 8px auto;border-top:2px dashed #17201b33}.car{position:absolute;top:4px;right:calc(var(--p)*(100% - 40px));width:40px;height:23px;border-radius:7px 13px 6px 6px;background:var(--c);box-shadow:0 5px 10px #17201b2b;transition:right .35s}.car:before{content:"";position:absolute;right:9px;top:-5px;width:18px;height:10px;border-radius:8px 8px 2px 2px;background:#ffffffaa}.car:after{content:"";position:absolute;left:7px;right:7px;bottom:-4px;height:7px;background:radial-gradient(circle at 4px 3px,#17201b 0 4px,transparent 5px),radial-gradient(circle at calc(100% - 4px) 3px,#17201b 0 4px,transparent 5px)}.score{text-align:center;font-weight:900;color:var(--teal)}@media(max-width:850px){header,.grid{display:block}.badge{display:inline-block;margin-top:10px}.control{position:static;margin-bottom:14px}.lane{grid-template-columns:1fr}.score{text-align:right}}@media(max-width:520px){.answers,.actions,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<header><h1>سباق المعرفة</h1><div class="badge">وضع تجريبي</div></header>
<section class="grid">
<aside class="panel control">
<label for="student">اسم الطالب</label><select id="student"></select>
<div class="stats"><div class="stat"><b id="score">0</b><span>النقاط</span></div><div class="stat"><b id="rank">-</b><span>المركز</span></div><div class="stat"><b id="done">0</b><span>إجابات</span></div></div>
<div class="question"><small id="round">السؤال 1</small><strong id="q"></strong></div>
<div id="answers" class="answers"></div>
<div class="actions"><button class="primary" id="next">السؤال التالي</button><button class="secondary" id="reset">بدء جديد</button></div>
<div id="toast" class="toast"></div>
</aside>
<section class="panel race"><h2>لوحة السباق</h2><div id="tracks" class="tracks"></div></section>
</section>
</main>
<script>
const students=["ابراهيم سمير محمود الخطيب","احمد عبدالله لطفي الجزار","اسامه محمد محمد مطر","الاء علاء علي صالحيه","إيناس رباح سليمان فرج الله","آلاء محسن خليل كلاب","آلاء محى الدين صالح الحلو","براء خالد على الطناني","داليا صخر محمد مقاط","رامي موسى عبدربه خلفالله","رانيا حمدي أحمد البردويل","ريهام احمد ابراهيم البلبيسي","زهية حمدان محمد أبوعقل","سماح عبدالله سلمان ابو بطيحان","سوسن عبد الفتاح عبدالله عياش","شذى عبد المقصود سلمان الشاعر","شيرين محمد جمعة محمد عوكل","صفاء محمد عبدربه النجار","عبد الله محمد عطية عبد الرحيم","عفاف موسى علي الصيرفي","لبنى محمد حمد أبوجزر","لمى نشأت عبد الرحمن الشنطي","مجد خيري موسى قطيط","محمد نسيم محمد الكحلوت","مريم حامد أحمد شعبان","منى محمد خليل لبد","نسرين اسماعيل أحمد ابو شماس","نهى صالح أحمد جابر","نوفل محمد ذيب السلطان"].map((name,i)=>({id:`student-${String(i+1).padStart(2,"0")}`,name}));
const questions=[{q:"ما ناتج 7 × 8؟",a:["54","56","58","64"],c:1},{q:"الكلمة التي تبدأ بهمزة قطع هي:",a:["اسم","ابن","أحمد","استخرج"],c:2},{q:"أي كوكب يعرف بالكوكب الأحمر؟",a:["المريخ","الزهرة","زحل","عطارد"],c:0},{q:"الجملة الاسمية تبدأ عادة بـ:",a:["فعل","حرف جر","اسم","ظرف"],c:2},{q:"كم دقيقة في ساعتين ونصف؟",a:["120","135","150","180"],c:2},{q:"الماء يتكون من:",a:["هيدروجين وأكسجين","كربون وحديد","نيتروجين فقط","أكسجين فقط"],c:0},{q:"جمع كلمة كتاب هو:",a:["كتابان","كتب","كاتب","مكتبة"],c:1},{q:"إذا كان العدد 36 يقبل القسمة على 4، فالناتج هو:",a:["7","8","9","10"],c:2},{q:"عاصمة فلسطين هي:",a:["القدس","غزة","رام الله","الخليل"],c:0},{q:"أي مما يلي مصدر للطاقة المتجددة؟",a:["الفحم","النفط","الشمس","الغاز"],c:2}];
const colors=["#177e89","#e96d5b","#49a078","#3b73d9","#f4b942","#7f5af0","#d95f8a"];
const $=id=>document.getElementById(id);let current=localStorage.raceStudentId||students[0].id;let qi=Number(localStorage.raceQuestionIndex||0);let locked=false;
function base(){return Object.fromEntries(students.map((s,i)=>[s.id,{...s,score:0,done:0,color:colors[i%colors.length]}]))}
let scores={...base(),...JSON.parse(localStorage.raceScores||"{}")};students.forEach((s,i)=>{if(s.id!==current&&!scores[s.id].score){scores[s.id].score=((i*7)+13)%65;scores[s.id].done=Math.floor(scores[s.id].score/10)}});
function save(){localStorage.raceScores=JSON.stringify(scores);localStorage.raceStudentId=current;localStorage.raceQuestionIndex=qi}
function renderSelect(){student.innerHTML=students.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");student.value=current}
function renderQuestion(){let item=questions[qi%questions.length];round.textContent=`السؤال ${(qi%questions.length)+1}`;q.textContent=item.q;answers.innerHTML=item.a.map((x,i)=>`<button class="answer" data-i="${i}">${x}</button>`).join("");locked=false}
function ranking(){return Object.values(scores).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,"ar"))}
function renderRace(){let rows=ranking(),top=Math.max(100,...rows.map(r=>r.score));tracks.innerHTML=rows.map((r,i)=>`<div class="lane ${r.id===current?"me":""}"><div class="name">${i+1}. ${r.name}<small>متسابق في سباق المعرفة</small></div><div class="road" style="--p:${Math.min(1,r.score/top)};--c:${r.color}"><div class="car"></div></div><div class="score">${r.score}</div></div>`).join("");let me=scores[current],pos=rows.findIndex(r=>r.id===current)+1;score.textContent=me.score;rank.textContent=pos;done.textContent=me.done}
answers.onclick=e=>{let b=e.target.closest("button");if(!b||locked)return;locked=true;let item=questions[qi%questions.length],ok=Number(b.dataset.i)===item.c;[...answers.children].forEach((x,i)=>{x.disabled=true;if(i===item.c)x.classList.add("ok")});if(!ok)b.classList.add("no");scores[current].score=Math.max(0,scores[current].score+(ok?10:-2));scores[current].done++;toast.textContent=ok?"إجابة صحيحة، تقدمت في السباق.":"محاولة جيدة، السؤال القادم فرصة جديدة.";save();renderRace()};
next.onclick=()=>{qi=(qi+1)%questions.length;toast.textContent="";save();renderQuestion()};
reset.onclick=()=>{scores[current].score=0;scores[current].done=0;qi=0;toast.textContent="تمت إعادة محاولة الطالب الحالي.";save();renderQuestion();renderRace()};
student.onchange=()=>{current=student.value;save();renderRace()};
renderSelect();renderQuestion();renderRace();
</script>
</body>
</html>
