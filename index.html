<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>سباق المعرفة</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:#fbfaf5;color:#17201b}main{width:min(1120px,calc(100% - 24px));margin:auto;padding:22px 0}header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}h1{font-size:clamp(34px,6vw,62px);margin:0}.badge{border:1px solid #d8ded8;background:white;border-radius:999px;padding:8px 12px;color:#607067}.grid{display:grid;grid-template-columns:minmax(300px,390px) 1fr;gap:16px}.panel{background:white;border:1px solid #d8ded8;border-radius:8px;box-shadow:0 16px 36px #17201b1c}.control{padding:16px;position:sticky;top:12px}label{display:block;color:#607067;font-size:14px;margin-bottom:7px}select,input,button{font:inherit}select,input{width:100%;min-height:46px;border:1px solid #cbd4cc;border-radius:8px;padding:0 12px}.auth{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}.auth button,.primary{background:#177e89;color:white}.auth button,.actions button{min-height:44px;border-radius:8px;border:0;font-weight:900;padding:0 14px;cursor:pointer}.note,.toast{min-height:24px;margin-top:8px;color:#607067;font-weight:800}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.stat{border:1px solid #d8ded8;border-radius:8px;background:#f7faf7;padding:10px}.stat b{display:block;font-size:24px}.stat span{font-size:12px;color:#607067}.question{min-height:138px;background:#17201b;color:white;border-radius:8px;padding:15px;display:grid;align-content:center;gap:8px}.question small{color:#ffffffaa}.question strong{font-size:20px;line-height:1.55}.answers,.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.answer{min-height:54px;border-radius:8px;border:1px solid #cfdad1;background:#edf4ef;font-weight:800;cursor:pointer;padding:8px}.answer:disabled{opacity:.62;cursor:not-allowed}.answer.ok{background:#dff4e7;border-color:#80c99d}.answer.no{background:#ffe5df;border-color:#f0a195}.secondary{background:white;color:#17201b;border:1px solid #d8ded8}.race h2{margin:0;padding:16px;border-bottom:1px solid #d8ded8}.tracks{padding:12px;display:grid;gap:8px;max-height:690px;overflow:auto}.lane{display:grid;grid-template-columns:minmax(135px,230px) 1fr 58px;gap:10px;align-items:center;min-height:56px;border:1px solid #d9e0d8;border-radius:8px;padding:8px;background:#fafcfb}.lane.me{border-color:#177e89;box-shadow:inset 0 0 0 2px #177e8926}.name{font-weight:900;line-height:1.28;overflow-wrap:anywhere}.name small{display:block;color:#607067;font-size:12px;font-weight:600}.road{position:relative;height:31px;border-radius:999px;background:#e5ece6;border:1px solid #cad5cd;overflow:hidden}.road:after{content:"";position:absolute;inset:14px 8px auto;border-top:2px dashed #17201b33}.car{position:absolute;top:4px;right:calc(var(--p)*(100% - 40px));width:40px;height:23px;border-radius:7px 13px 6px 6px;background:var(--c);box-shadow:0 5px 10px #17201b2b;transition:right .35s}.car:before{content:"";position:absolute;right:9px;top:-5px;width:18px;height:10px;border-radius:8px 8px 2px 2px;background:#ffffffaa}.score{text-align:center;font-weight:900;color:#177e89}@media(max-width:850px){header,.grid{display:block}.badge{display:inline-block;margin-top:10px}.control{position:static;margin-bottom:14px}.lane{grid-template-columns:1fr}.score{text-align:right}}@media(max-width:520px){.answers,.actions,.stats,.auth{grid-template-columns:1fr}}</style></head><body><main><header><h1>سباق المعرفة</h1><div class="badge">أسئلة دكتوراه المناهج</div></header><section class="grid"><aside class="panel control"><label for="student">اسم الطالب</label><select id="student"></select><div class="auth"><input id="pass" type="password" inputmode="numeric" autocomplete="current-password" placeholder="رقم الطالب أو كلمة المعلم"><button id="login" type="button">دخول</button></div><div id="note" class="note">أدخل رقم الطالب المطابق للاسم، أو كلمة المعلم.</div><div class="stats"><div class="stat"><b id="score">0</b><span>النقاط</span></div><div class="stat"><b id="rank">-</b><span>المركز</span></div><div class="stat"><b id="done">0</b><span>إجابات</span></div></div><div class="question"><small id="round">السؤال 1</small><strong id="q"></strong></div><div id="answers" class="answers"></div><div class="actions"><button class="primary" id="next">السؤال التالي</button><button class="secondary" id="reset">بدء جديد</button></div><div id="toast" class="toast"></div></aside><section class="panel race"><h2>لوحة السباق</h2><div id="tracks" class="tracks"></div></section></section></main><script>const VERSION="doctorate-random-1",SALT="MasterTest-2026:",TEACHER="cbe3bf036892019194656299f332f81ed38f1dc3c64d6064e8f39ea696d69e39";const students=[
["c34243d7ccca1e0c3e75400eb0372c81c0ae19508785e96defc018723af04fbf","ابراهيم سمير محمود الخطيب"],["b723df0c82a01e4532b737e0cb7071b7ee7596ea4090d2163c9f909d36cb90bf","احمد عبدالله لطفي الجزار"],["6f056a628ef89f3a9f7652cb0705b87033826399485b51c35f0895b53f3c8a56","اسامه محمد محمد مطر"],["6eb5a63f41732615e32e67e211115b1ccc7a1ee073ec1de127e4761eba11d7e3","الاء علاء علي صالحيه"],["d4825e78aa8a5a43b5640e04556bf98f175947421b051c85a9c25fc1c050fdb2","إيناس رباح سليمان فرج الله"],["e1fc98d01973c499891e86066334211d64750776d524b76d02347bf20cf40613","آلاء محسن خليل كلاب"],["c5ee2ad1612ecce56747e8b27aee626f907e7b41284d0092a6bc781bf3014e06","آلاء محى الدين صالح الحلو"],["956d6e367b412193e96fb9277f8b1c2b8b29dadb2e47855868f88969c4b1fa31","براء خالد على الطناني"],["5ad56ca66f6f56298c327f1be040dcaa13d2a553415aab7209162d9f7e9ac7a3","داليا صخر محمد مقاط"],["f48dd9f228593099c697282eebbb5f54a7c774ef9650822a42ec401ea1bcaca3","رامي موسى عبدربه خلفالله"],["3438263ebf61589601f8b7ea2c377091425db0532c94c3e3b3c9924c053bbc65","رانيا حمدي أحمد البردويل"],["26b74830c49a3acb5fbdc673878b873bfdd41732a76f46c5bb5fdf025d35ba96","ريهام احمد ابراهيم البلبيسي"],["08dd91d1142fc2bd89b6027b4ff44c1d5c28183dd9ab31e8c92fc812749dd92c","زهية حمدان محمد أبوعقل"],["ea5a732438a88f52d9aab85008d7ecc896d43832c8c8748404c883c4b49eecac","سماح عبدالله سلمان ابو بطيحان"],["1c219128e4a545d6056b476354e1d43bcd028fc9cf709425bfa7bee0f360efc2","سوسن عبد الفتاح عبدالله عياش"],["955a1570be6e8f5de66de2a8aefe156967765f013dbf12c94cbaa2f18ad7df9d","شذى عبد المقصود سلمان الشاعر"],["87e10da89e730dc2ae2711276766b61213d6b5e771e335ba79807185aae57787","شيرين محمد جمعة محمد عوكل"],["bb35a7e06297eb3e354f95793236a9caf6db96ff2304eb88292b9a5180c9c20c","صفاء محمد عبدربه النجار"],["a96b89251b748867fc5a8c21232f52412b846043707d49f7eb00e4f9cfa8d489","عبد الله محمد عطية عبد الرحيم"],["edf78ef4e82362619ef7a641312b6cd67315bcbd43c752e5476740d43ac0caa5","عفاف موسى علي الصيرفي"],["d9816b6c18606c59ed12bfdd1b21825eb9801c3752ded7b8f4bdeb517166db58","لبنى محمد حمد {q:"وفق بنية الكتاب، ما العبارة التي تصف بدقة انتقاله من التنظير إلى التطبيق في الذكاء الاصطناعي التعليمي؟",a:["يبدأ بالأدوات الصفية ثم يعود إلى التعريفات","ينتقل من المفاهيم والأسس النظرية إلى الأخلاقيات ثم التطبيقات ودراسات الحالة والمستقبل","يركز على البحث الأكاديمي فقط ثم يختم بالتقييم","يعرض تاريخ الذكاء الاصطناعي منفصلا عن التعليم"],c:1},{q:"إذا صمم نظام ذكاء اصطناعي مسارات تعلم مختلفة حسب أداء كل طالب ووتيرته، فما المفهوم المركزي الذي يجسده ذلك؟",a:["التوحيد المنهجي","التعلم الشخصي والتكيفي","التقييم الختامي الثابت","الحوسبة الإدارية"],c:1},{q:"ما السبب الأعمق لاعتبار نظريات الحمل المعرفي مهمة عند تصميم أدوات تعليمية مدعومة بالذكاء الاصطناعي؟",a:["لأنها تمنع استخدام البيانات نهائيا","لأنها تساعد في ضبط مقدار المعالجة الذهنية المطلوبة من المتعلم","لأنها تختصر دور المعلم في التصحيح الآلي","لأنها تجعل كل المحتوى بصريا فقط"],c:1},{q:"أي موقف يمثل خطرا أخلاقيا يرتبط بالتحيز الخوارزمي كما يناقشه الملف؟",a:["نظام يقترح مراجعات إضافية بعد اختبار تشخيصي","نظام قبول آلي يفضل فئة سكانية بسبب بيانات تدريب غير ممثلة","نظام يوفر تغذية راجعة فورية لكل الطلبة","نظام يتيح للمعلم مراجعة نتائج التحليل"],c:1},{q:"ما الشرط الأكثر ارتباطا بالمساءلة والشفافية في أنظمة الذكاء الاصطناعي التعليمية؟",a:["إخفاء منطق القرار لحماية النظام","إتاحة تفسير واضح للتوصيات مع رقابة بشرية قابلة للمراجعة","ترك النظام يعمل دون تدخل حتى لا يتأثر","استبدال السياسات التعليمية بخوارزميات عامة"],c:1},{q:"عند جمع بيانات تعلم واسعة لتخصيص التدريس، ما التوازن الذي يؤكد عليه الملف؟",a:["تعظيم جمع البيانات ولو دون موافقة","الجمع بين تحسين التعلم وحماية الخصوصية وأمن البيانات","منع أي تحليل بيانات في التعليم","استخدام البيانات للترتيب فقط"],c:1},{q:"لماذا لا يكفي إدخال منصة ذكاء اصطناعي إلى المدرسة لضمان التطوير التعليمي؟",a:["لأن النجاح يتطلب تخطيطا وتنفيذا وتقييما دقيقا يربط الأداة بالأهداف التعليمية","لأن الذكاء الاصطناعي لا يعمل إلا في التعليم العالي","لأن دور المعلم يصبح غير ضروري","لأن المنصات تعمل فقط دون بيانات"],c:0},{q:"ما العلاقة التي يعرضها الفصل الثاني بين النظريات المعرفية والنظريات التعليمية ونظريات التفاعل بين الإنسان والحاسوب؟",a:["علاقة تنافسية يلغى فيها أحدها الآخر","علاقة تكاملية توجه تصميم أنظمة أكثر تكيفا وسهولة وفاعلية","علاقة تاريخية لا تؤثر في التصميم","علاقة إدارية تخص الجداول والقبول"],c:1},{q:"أي استخدام للذكاء الاصطناعي في البحث العلمي يعكس ما يطرحه الملف دون أن يتجاوز أخلاقيات الكتابة الأكاديمية؟",a:["توليد بحث كامل ونسبته للباحث","تحليل الأدبيات واستخلاص الأنماط مع الإفصاح والمراجعة البشرية","استبدال التحكيم العلمي بنتائج آلية","إخفاء مصادر البيانات لتقليل التعقيد"],c:1},{q:"ما الفرق الجوهري بين التعلم الآلي والتعلم العميق كما يرد ضمن مفاهيم الذكاء الاصطناعي؟",a:["التعلم العميق أوسع من الذكاء الاصطناعي كله","التعلم العميق مجال فرعي من التعلم الآلي يعتمد على الشبكات العصبية","التعلم الآلي لا يستخدم البيانات","التعلم العميق يعني التعليم الإلكتروني فقط"],c:1},{q:"في سياق أنظمة إدارة التعلم المدعومة بالذكاء الاصطناعي، ما الوظيفة الأكثر اتساقا مع الفصل الرابع؟",a:["تحسين إدارة المحتوى والمهام الإدارية وتخصيص تجربة التعلم","إلغاء كل أنشطة المعلم الصفية","منع التفاعل بين الطلبة","تحويل المنهج إلى اختبار واحد"],c:0},{q:"أي إجراء يعد أكثر ملاءمة لتخفيف التحيز في نظام تعليمي ذكي؟",a:["استخدام بيانات ضيقة لأنها أسهل في التحليل","تنويع بيانات التدريب ومراقبة المخرجات وتصحيح الانحيازات باستمرار","إخفاء نتائج النظام عن المعلمين","اعتماد أول نموذج يحقق سرعة أعلى"],c:1},{q:"ما الفكرة التي تلخص الاتجاهات المستقبلية للذكاء الاصطناعي في التعليم كما يعرضها الملف؟",a:["العودة إلى التعليم الموحد للجميع","تعلم شخصي ومسارات تكيفية ومعلمون افتراضيون مع استمرار الحاجة للحوكمة","حصر الذكاء الاصطناعي في التصحيح","إلغاء المناهج الدراسية تماما"],c:1},{q:"عند تقييم فائدة الذكاء الاصطناعي في التعليم، أي معيار يعكس فهما نقديا للخاتمة؟",a:["مدى حداثة الأداة فقط","قدرته على تحسين التعلم مع معالجة المعضلات الأخلاقية والاجتماعية","عدد الرسوم في الواجهة","إمكانية استخدامه دون معلم"],c:1},{q:"لماذا تعد دراسات الحالة مهمة في الكتاب؟",a:["لأنها تثبت أن كل تطبيق ناجح في كل سياق","لأنها تكشف الفوائد والتحديات وأفضل الممارسات في التنفيذ الواقعي","لأنها تلغي الحاجة إلى الأسس النظرية","لأنها تركز على الجانب التقني فقط"],c:1},{q:"أي تصور لدور المعلم ينسجم مع الرؤية المسؤولة للذكاء الاصطناعي في الملف؟",a:["المعلم مراقب أخلاقي وموجه تربوي يستخدم الذكاء الاصطناعي لتحسين التعلم","المعلم عنصر زائد بعد وجود الخوارزمية","المعلم يترك القرار كاملا للنظام","المعلم يستخدم الذكاء الاصطناعي لإخفاء الفروق الفردية"],c:0}];const colors=["#177e89","#e96d5b","#49a078","#3b73d9","#f4b942","#7f5af0","#d95f8a"],$=id=>document.getElementById(id);let current=localStorage.raceStudentId||students[0].id,qi=Number(localStorage.raceQuestionIndex||0),locked=false,auth=sessionStorage.raceAuthenticated==="true",teacher=sessionStorage.raceTeacherMode==="true",currentCorrect=0;function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}let qOrder;try{qOrder=JSON.parse(localStorage.raceQuestionOrder||"[]")}catch{qOrder=[]}function buildOrder(){qOrder=shuffle(questions.map((_,i)=>i));localStorage.raceQuestionOrder=JSON.stringify(qOrder)}function base(){return Object.fromEntries(students.map((s,i)=>[s.id,{...s,score:0,done:0,color:colors[i%colors.length]}]))}let scores={...base(),...JSON.parse(localStorage.raceScores||"{}")};if(localStorage.raceGameVersion!==VERSION){scores=base();qi=0;localStorage.raceGameVersion=VERSION;localStorage.raceScores=JSON.stringify(scores);localStorage.raceQuestionIndex="0";localStorage.removeItem("raceQuestionOrder");buildOrder()}if(qOrder.length!==questions.length)buildOrder();async function digest(v){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(SALT+v));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")}function save(){localStorage.raceScores=JSON.stringify(scores);localStorage.raceStudentId=current;localStorage.raceQuestionIndex=qi;localStorage.raceGameVersion=VERSION;localStorage.raceQuestionOrder=JSON.stringify(qOrder)}function setNote(){let s=students.find(x=>x.id===current);note.textContent=teacher?"دخول المعلم مفعل.":auth?`تم دخول ${s?.name||"الطالب"}.`:"أدخل رقم الطالب المطابق للاسم، أو كلمة المعلم."}function renderSelect(){student.innerHTML=students.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");student.value=current}function renderQuestion(){let item=questions[qOrder[Math.min(qi,questions.length-1)]],opts=shuffle(item.a.map((x,i)=>({x,i})));currentCorrect=opts.findIndex(o=>o.i===item.c);round.textContent=`السؤال ${Math.min(qi+1,questions.length)} من ${questions.length}`;q.textContent=item.q;answers.innerHTML=opts.map((o,i)=>`<button class="answer" data-i="${i}" ${auth?"":"disabled"}>${o.x}</button>`).join("");locked=!auth;setNote()}function ranking(){return Object.values(scores).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,"ar"))}function renderRace(){let rows=ranking(),top=Math.max(100,...rows.map(r=>r.score));tracks.innerHTML=rows.map((r,i)=>`<div class="lane ${r.id===current?"me":""}"><div class="name">${i+1}. ${r.name}<small>متسابق في سباق المعرفة</small></div><div class="road" style="--p:${Math.min(1,r.score/top)};--c:${r.color}"><div class="car"></div></div><div class="score">${r.score}</div></div>`).join("");let me=scores[current],pos=rows.findIndex(r=>r.id===current)+1;score.textContent=me.score;rank.textContent=pos;done.textContent=me.done}login.onclick=async()=>{let h=await digest(pass.value.trim()),s=students.find(x=>x.id===current);if(h===TEACHER){auth=true;teacher=true;sessionStorage.raceAuthenticated="true";sessionStorage.raceTeacherMode="true";toast.textContent="تم دخول المعلم."}else if(s&&h===s.passHash){auth=true;teacher=false;sessionStorage.raceAuthenticated="true";sessionStorage.raceTeacherMode="false";toast.textContent="تم الدخول بنجاح."}else{auth=false;teacher=false;sessionStorage.removeItem("raceAuthenticated");sessionStorage.removeItem("raceTeacherMode");toast.textContent="كلمة المرور غير صحيحة لهذا الاسم."}pass.value="";renderQuestion();renderRace()};pass.onkeydown=e=>{if(e.key==="Enter")login.click()};answers.onclick=e=>{let b=e.target.closest("button");if(!auth){toast.textContent="أدخل كلمة المرور أولا.";return}if(!b||locked)return;locked=true;let ok=Number(b.dataset.i)===currentCorrect;[...answers.children].forEach((x,i)=>{x.disabled=true;if(i===currentCorrect)x.classList.add("ok")});if(!ok)b.classList.add("no");scores[current].score=Math.max(0,scores[current].score+(ok?10:-2));scores[current].done++;toast.textContent=ok?"إجابة صحيحة، تقدمت في السباق.":"محاولة جيدة، السؤال القادم فرصة جديدة.";save();renderRace()};next.onclick=()=>{if(!auth){toast.textContent="أدخل كلمة المرور أولا.";return}if(qi>=questions.length-1){toast.textContent="انتهت الأسئلة. نتيجتك محفوظة، ولا تبدأ من جديد إلا عند الضغط على بدء جديد.";save();return}qi++;toast.textContent="";save();renderQuestion()};reset.onclick=()=>{if(!auth){toast.textContent="أدخل كلمة المرور أولا.";return}scores[current].score=0;scores[current].done=0;qi=0;buildOrder();toast.textContent="تمت إعادة محاولة الطالب الحالي.";save();renderQuestion();renderRace()};student.onchange=()=>{current=student.value;if(!teacher){auth=false;sessionStorage.removeItem("raceAuthenticated");sessionStorage.removeItem("raceTeacherMode")}save();renderQuestion();renderRace()};renderSelect();renderQuestion();renderRace();</script></body></html>
